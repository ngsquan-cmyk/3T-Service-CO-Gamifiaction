openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MM Mega Market 3T Training Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: game
    description: Game scores and leaderboard
  - name: manager
    description: Manager analytics dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /game/scores:
    post:
      operationId: submitScore
      tags: [game]
      summary: Submit a game score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "201":
          description: Score submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"

  /game/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [game]
      summary: Get top scores leaderboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

  /game/stats:
    get:
      operationId: getGameStats
      tags: [game]
      summary: Get overall game statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStats"

  /manager/overview:
    get:
      operationId: getManagerOverview
      tags: [manager]
      summary: Manager dashboard overview — key KPIs
      responses:
        "200":
          description: Overview KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerOverview"

  /manager/module-performance:
    get:
      operationId: getModulePerformance
      tags: [manager]
      summary: Average score per 3T category across all players
      responses:
        "200":
          description: Per-category performance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModulePerformance"

  /manager/score-distribution:
    get:
      operationId: getScoreDistribution
      tags: [manager]
      summary: How scores are distributed across grade bands
      responses:
        "200":
          description: Score distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoreDistributionBand"

  /manager/recent-plays:
    get:
      operationId: getRecentPlays
      tags: [manager]
      summary: Most recent game sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

  /manager/badge-breakdown:
    get:
      operationId: getBadgeBreakdown
      tags: [manager]
      summary: Count of players at each badge level
      responses:
        "200":
          description: Badge counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BadgeCount"

  /manager/settings:
    get:
      operationId: getSettings
      tags: [manager]
      summary: Get current game settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSettings"
    put:
      operationId: updateSettings
      tags: [manager]
      summary: Update game settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSettings"

  /manager/reset-scores:
    post:
      operationId: resetScores
      tags: [manager]
      summary: Delete all scores (use with caution)
      responses:
        "200":
          description: Scores cleared
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ScoreInput:
      type: object
      required:
        - playerName
        - totalScore
        - friendlyScore
        - proficientScore
        - dedicatedScore
        - happinessPercent
        - badge
      properties:
        playerName:
          type: string
        totalScore:
          type: integer
        friendlyScore:
          type: integer
        proficientScore:
          type: integer
        dedicatedScore:
          type: integer
        happinessPercent:
          type: integer
        badge:
          type: string
        avgProcessingSeconds:
          type: ["integer", "null"]
        paymentErrors:
          type: integer

    Score:
      type: object
      required:
        - id
        - playerName
        - totalScore
        - friendlyScore
        - proficientScore
        - dedicatedScore
        - happinessPercent
        - badge
        - createdAt
      properties:
        id:
          type: integer
        playerName:
          type: string
        totalScore:
          type: integer
        friendlyScore:
          type: integer
        proficientScore:
          type: integer
        dedicatedScore:
          type: integer
        happinessPercent:
          type: integer
        badge:
          type: string
        avgProcessingSeconds:
          type: ["integer", "null"]
        paymentErrors:
          type: integer
        createdAt:
          type: string

    GameStats:
      type: object
      required:
        - totalPlays
        - avgScore
        - topScore
        - avgHappiness
      properties:
        totalPlays:
          type: integer
        avgScore:
          type: integer
        topScore:
          type: integer
        avgHappiness:
          type: integer

    ManagerOverview:
      type: object
      required:
        - totalPlays
        - avgTotalScore
        - avgFriendlyScore
        - avgProficientScore
        - avgDedicatedScore
        - avgHappiness
        - topScore
        - passRate
        - avgPaymentErrors
      properties:
        totalPlays:
          type: integer
        avgTotalScore:
          type: integer
        avgFriendlyScore:
          type: integer
        avgProficientScore:
          type: integer
        avgDedicatedScore:
          type: integer
        avgHappiness:
          type: integer
        topScore:
          type: integer
        passRate:
          type: integer
          description: Percentage of players scoring >= 70
        avgPaymentErrors:
          type: number

    ModulePerformance:
      type: object
      required:
        - friendly
        - proficient
        - dedicated
        - friendlyMax
        - proficientMax
        - dedicatedMax
      properties:
        friendly:
          type: integer
          description: Average friendly score
        proficient:
          type: integer
          description: Average proficient score
        dedicated:
          type: integer
          description: Average dedicated score
        friendlyMax:
          type: integer
          description: Max possible friendly score (30)
        proficientMax:
          type: integer
          description: Max possible proficient score (40)
        dedicatedMax:
          type: integer
          description: Max possible dedicated score (30)

    ScoreDistributionBand:
      type: object
      required:
        - band
        - count
        - label
      properties:
        band:
          type: string
        label:
          type: string
        count:
          type: integer

    BadgeCount:
      type: object
      required:
        - badge
        - count
        - minScore
      properties:
        badge:
          type: string
        count:
          type: integer
        minScore:
          type: integer

    GameSettings:
      type: object
      required:
        - id
        - storeName
        - passingScore
        - quickChallengeTimer
        - activeModules
        - customMessages
        - showLeaderboardOnHome
        - maxLeaderboardEntries
      properties:
        id:
          type: integer
        storeName:
          type: string
        passingScore:
          type: integer
          description: Minimum score to be considered passing (default 70)
        quickChallengeTimer:
          type: integer
          description: Seconds per question in quick challenge (default 15)
        activeModules:
          type: string
          description: Comma-separated module IDs that are active e.g. "1,2,3,4,5,6"
        customMessages:
          type: string
          description: Pipe-separated custom motivational messages, empty string means use defaults
        showLeaderboardOnHome:
          type: boolean
        maxLeaderboardEntries:
          type: integer

    GameSettingsInput:
      type: object
      properties:
        storeName:
          type: string
        passingScore:
          type: integer
        quickChallengeTimer:
          type: integer
        activeModules:
          type: string
        customMessages:
          type: string
        showLeaderboardOnHome:
          type: boolean
        maxLeaderboardEntries:
          type: integer
