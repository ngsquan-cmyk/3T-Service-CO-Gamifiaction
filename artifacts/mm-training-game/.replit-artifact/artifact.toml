kind = "web"
previewPath = "/"
title = "MM Mega Market 3T Training Game"
version = "1.0.0"
id = "artifacts/mm-training-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21285

[services.development]
run = "pnpm --filter @workspace/mm-training-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mm-training-game", "run", "build" ]
publicDir = "artifacts/mm-training-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21285"
BASE_PATH = "/"
